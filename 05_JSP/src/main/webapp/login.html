<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>

body{
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
}

form{
    background:white;
    padding:40px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

form div{
    margin-bottom:15px;
}

input{
    width:200px;
    padding:8px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#45a049;
}

</style>

</head>
<body>


<form action="login_output2.jsp" method="post">

    <div>
        <div>ID : <input type="text" name="id"></div>
        <div>PW : <input type="password" name="pw"></div>
        <div><button>Login</button></div>
    </div>
</form>

</body>
</html>
